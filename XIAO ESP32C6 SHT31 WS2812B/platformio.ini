[platformio]
default_envs = xiao_esp32c6_zigbee

[env:xiao_esp32c6_zigbee]
platform = espressif32@6.6.0
board = esp32-c6-devkitm-1
framework = espidf

# Configuration du port (à adapter selon ton système)
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200

# Build flags ESP-IDF Zigbee
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ZB_ENABLED=1
    -DCONFIG_ZB_ZC_CONFIG=1
    -DCONFIG_ESP32C6_DEFAULT_CPU_FREQ_160=1

# Configuration ESP-IDF pour Zigbee
build_type = release
board_build.partitions = zigbee.csv
board_build.filesystem = littlefs
board_build.flash_size = 4MB
board_build.psram_type = qspi

# Librairies ESP-IDF
lib_deps =
    adafruit/Adafruit SHT31 Library@^2.2.0
    adafruit/Adafruit NeoPixel@^1.12.0
